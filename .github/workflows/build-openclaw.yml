name: Build OpenClaw Gateway Image

on:
  push:
    branches: [main]
    paths:
      - 'infra/Dockerfile.openclaw'
      - 'infra/scripts/openclaw-entrypoint.sh'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/mycelium-openclaw

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.openclaw
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
