name: E2E Tests

on:
  push:
    branches:
      - '**'
      - '!main'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite to run'
        type: choice
        default: 'weekly_full'
        options:
          - weekly_full
          - sanity
          - core
          - convergence
          - distributed
          - integration
      datafile:
        description: 'Datafile override (relative to data/)'
        default: 'ci_datafile.yaml'
      image_tag:
        description: 'Mycelium image tag'
        default: 'latest'
      stub_embeddings:
        description: 'Use stub embeddings (skip model download)'
        type: boolean
        default: true
      mycelium_ref:
        description: 'Mycelium repo ref — leave empty or "main" to use release install; set a branch/tag/SHA to build from source'
        default: ''

env:
  COMPOSE_FILE: infra/compose.e2e.yaml
  MYCELIUM_IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
  MYCELIUM_STUB_EMBEDDINGS: ${{ github.event.inputs.stub_embeddings == 'false' && '0' || '1' }}
  MYCELIUM_DB_PASSWORD: password
  CFN_NAME: mycelium-cfn
  LLM_MODEL: ${{ secrets.LLM_MODEL || vars.LLM_MODEL || '' }}
  LLM_API_KEY: ${{ secrets.LLM_API_KEY || vars.LLM_API_KEY || '' }}
  LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || vars.LLM_BASE_URL || '' }}

jobs:
  e2e:
    name: E2E Suite (${{ github.event.inputs.suite || 'weekly_full' }})
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout e2e-test repo
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine build mode
        run: |
          REF="${{ github.event.inputs.mycelium_ref }}"
          if [ -n "$REF" ] && [ "$REF" != "main" ]; then
            echo "BUILD_FROM_SOURCE=true" >> "$GITHUB_ENV"
            echo "Building mycelium from source (ref=$REF)"
          else
            echo "BUILD_FROM_SOURCE=false" >> "$GITHUB_ENV"
            echo "Using release artifacts"
          fi

      - name: Checkout mycelium repo (for source build)
        if: env.BUILD_FROM_SOURCE == 'true'
        uses: actions/checkout@v4
        with:
          repository: mycelium-io/mycelium
          ref: ${{ github.event.inputs.mycelium_ref }}
          path: mycelium
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build mycelium images from source
        if: env.BUILD_FROM_SOURCE == 'true'
        run: |
          docker build -t mycelium-backend:dev \
            -f mycelium/fastapi-backend/Dockerfile mycelium/fastapi-backend/
          docker build -t mycelium-collector:dev \
            -f mycelium/mycelium-cli/Dockerfile.collector mycelium/mycelium-cli/
          echo "MYCELIUM_BACKEND_IMAGE=mycelium-backend:dev" >> "$GITHUB_ENV"

      - name: Verify LLM configuration
        run: |
          echo "=== LLM environment check ==="
          [ -n "$LLM_API_KEY" ]   && echo "LLM_API_KEY:   set (${#LLM_API_KEY} chars)" \
                                   || echo "LLM_API_KEY:   *** NOT SET ***"
          [ -n "$LLM_BASE_URL" ]  && echo "LLM_BASE_URL:  set (${#LLM_BASE_URL} chars)" \
                                   || echo "LLM_BASE_URL:  *** NOT SET ***"
          [ -n "$LLM_MODEL" ]     && echo "LLM_MODEL:     $LLM_MODEL" \
                                   || echo "LLM_MODEL:     *** NOT SET ***"
          if [ -z "$LLM_API_KEY" ] || [ -z "$LLM_BASE_URL" ]; then
            echo ""
            echo "WARNING: LLM-dependent tests (synthesis, catchup, convergence) will"
            echo "be skipped unless all three vars are set in GitHub secrets or vars."
          fi

      - name: Start infrastructure
        run: |
          docker compose -f $COMPOSE_FILE up -d \
            mycelium-db matrix-synapse
          echo "Waiting for DB and Matrix..."
          docker compose -f $COMPOSE_FILE up -d \
            ioc-cfn-mgmt-plane-svc ioc-cognition-fabric-node-svc
          docker compose -f $COMPOSE_FILE up -d \
            mycelium-backend

      - name: Wait for services healthy
        run: |
          services=(e2e-mycelium-db e2e-matrix-synapse e2e-cfn-mgmt e2e-cfn-node e2e-mycelium-backend)
          for svc in "${services[@]}"; do
            echo "Waiting for $svc..."
            for i in $(seq 1 60); do
              status=$(docker inspect --format='{{.State.Health.Status}}' "$svc" 2>/dev/null || echo "missing")
              if [ "$status" = "healthy" ]; then
                echo "  $svc is healthy"
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "  ERROR: $svc did not become healthy (status=$status)"
                docker logs "$svc" --tail 50
                exit 1
              fi
              sleep 3
            done
          done

      - name: Run Matrix bootstrap
        run: |
          docker compose -f $COMPOSE_FILE run --rm matrix-bootstrap

      - name: Run Mycelium bootstrap
        run: |
          docker compose -f $COMPOSE_FILE run --rm mycelium-bootstrap

      - name: Fetch workspace/MAS IDs and propagate to backend
        run: |
          # The bootstrap container wrote config to the e2e-shared volume.
          # Derive the compose project name to get the correct volume prefix.
          PROJECT=$(docker compose -f $COMPOSE_FILE config --format json | python3 -c "import sys,json; print(json.load(sys.stdin).get('name','infra'))")
          VOLUME="${PROJECT}_e2e-shared"
          echo "Reading IDs from volume: $VOLUME"
          eval "$(docker run --rm \
            -v "${VOLUME}:/shared:ro" \
            python:3.12-slim \
            python3 -c "
          import json, pathlib
          p = pathlib.Path('/shared/mycelium-config.json')
          if p.exists():
              cfg = json.loads(p.read_text())
              for key in ('workspace_id', 'mas_id'):
                  v = cfg.get(key, '')
                  if v:
                      print(f'{key.upper()}={v}')
          " 2>/dev/null)"

          if [ -n "$WORKSPACE_ID" ] || [ -n "$MAS_ID" ]; then
            echo "WORKSPACE_ID=$WORKSPACE_ID"
            echo "MAS_ID=$MAS_ID"
            # Persist to GITHUB_ENV so subsequent steps (e.g. openclaw-hub)
            # don't cause Compose to recreate the backend with empty values.
            echo "WORKSPACE_ID=$WORKSPACE_ID" >> "$GITHUB_ENV"
            echo "MAS_ID=$MAS_ID" >> "$GITHUB_ENV"
            docker compose -f $COMPOSE_FILE stop mycelium-backend
            export WORKSPACE_ID MAS_ID
            docker compose -f $COMPOSE_FILE up -d mycelium-backend
            for i in $(seq 1 30); do
              status=$(docker inspect --format='{{.State.Health.Status}}' e2e-mycelium-backend 2>/dev/null || echo "missing")
              [ "$status" = "healthy" ] && break
              sleep 2
            done
            echo "Backend restarted with WORKSPACE_ID=$WORKSPACE_ID MAS_ID=$MAS_ID (status=$status)"
          else
            echo "No workspace/MAS ID found — skipping"
          fi

      - name: Start OpenClaw gateway
        run: |
          docker compose -f $COMPOSE_FILE up -d --no-recreate openclaw-hub
          echo "Waiting for OpenClaw hub to start..."
          for i in $(seq 1 90); do
            status=$(docker inspect --format='{{.State.Health.Status}}' e2e-openclaw-hub 2>/dev/null || echo "missing")
            if [ "$status" = "healthy" ]; then
              echo "  OpenClaw hub is healthy"
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "  WARNING: OpenClaw hub did not become healthy (status=$status)"
              docker logs e2e-openclaw-hub --tail 30
            fi
            sleep 2
          done

      - name: Register OpenClaw adapter
        run: |
          mycelium adapter add openclaw \
            --openclaw-container e2e-openclaw-hub \
            --yes
          mycelium adapter add openclaw \
            --openclaw-container e2e-openclaw-hub \
            --step=otel \
            --yes 2>&1 || echo "otel step skipped (non-fatal)"

      - name: Verify backend container environment
        run: |
          echo "=== Backend container env check ==="
          for var in LLM_API_KEY LLM_BASE_URL LLM_MODEL WORKSPACE_ID MAS_ID; do
            val=$(docker exec e2e-mycelium-backend printenv "$var" 2>/dev/null || echo "")
            if [ -n "$val" ]; then
              if [ "$var" = "LLM_API_KEY" ]; then
                echo "  $var: set (${#val} chars)"
              else
                echo "  $var: $val"
              fi
            else
              echo "  $var: *** NOT SET ***"
            fi
          done

          echo ""
          echo "=== Backend /health LLM status ==="
          curl -sf http://localhost:8000/health | python3 -c "
          import sys, json
          h = json.load(sys.stdin)
          llm = h.get('llm', 'missing')
          print(json.dumps(llm, indent=2) if isinstance(llm, dict) else f'llm: {llm}')
          " 2>/dev/null || echo "Could not fetch /health"

      - name: Set up Python and uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync

      - name: Install mycelium CLI (release)
        if: env.BUILD_FROM_SOURCE != 'true'
        run: |
          curl -fsSL https://mycelium-io.github.io/mycelium/install.sh | bash
          mycelium --version || mycelium --help | head -5

      - name: Install mycelium CLI (from source)
        if: env.BUILD_FROM_SOURCE == 'true'
        run: |
          uv tool install ./mycelium/mycelium-cli --force --link-mode=copy
          mycelium --version || mycelium --help | head -5

      - name: Initialize mycelium CLI config
        run: |
          mkdir -p ~/.mycelium
          mycelium init --api-url http://localhost:8000 2>/dev/null || true
          if [ ! -f ~/.mycelium/config.toml ]; then
            echo "mycelium init did not create config.toml — writing manually"
            cat > ~/.mycelium/config.toml <<'TOML'
          [server]
          api_url = "http://localhost:8000"

          [rooms]
          active = "mycelium_room"
          TOML
          fi
          mycelium config set server.api_url http://localhost:8000 2>/dev/null || true
          mycelium config set rooms.active mycelium_room 2>/dev/null || true

          # Write .env with LLM credentials so CLI commands can use them
          {
            [ -n "$LLM_API_KEY" ]  && echo "LLM_API_KEY=$LLM_API_KEY"
            [ -n "$LLM_BASE_URL" ] && echo "LLM_BASE_URL=$LLM_BASE_URL"
            [ -n "$LLM_MODEL" ]    && echo "LLM_MODEL=$LLM_MODEL"
          } > ~/.mycelium/.env
          echo "Wrote ~/.mycelium/.env ($(wc -l < ~/.mycelium/.env) lines)"

          echo "=== CLI config.toml ==="
          cat ~/.mycelium/config.toml

          echo ""
          echo "=== CLI config verification ==="
          echo "server.api_url = $(mycelium config get server.api_url 2>/dev/null || echo 'FAILED TO READ')"
          echo "rooms.active   = $(mycelium config get rooms.active 2>/dev/null || echo 'FAILED TO READ')"

          echo ""
          echo "=== CLI doctor ==="
          mycelium doctor 2>&1 || true

      - name: Run E2E tests
        env:
          MYCELIUM_DATAFILE: ${{ github.event.inputs.datafile || 'ci_datafile.yaml' }}
        run: |
          SUITE="${{ github.event.inputs.suite || 'weekly_full' }}"
          JOB_FILE="jobs/${SUITE}_job.py"

          if [ "$SUITE" = "weekly_full" ]; then
            JOB_FILE="jobs/weekly_e2e_job.py"
          fi

          echo "Running: pyats run job $JOB_FILE (MYCELIUM_DATAFILE=$MYCELIUM_DATAFILE)"
          mkdir -p artifacts/pyats-runinfo artifacts/pyats-archive

          uv run pyats run job "$JOB_FILE" \
            --html-logs artifacts \
            --runinfo-dir artifacts/pyats-runinfo \
            --archive-dir artifacts/pyats-archive \
            --no-archive-subdir

      - name: Print pyATS results summary
        if: always()
        run: |
          echo "=== pyATS Results ==="

          # Find the runinfo directory (uncompressed run data)
          RUNINFO=$(ls -td artifacts/pyats-runinfo/*/ 2>/dev/null | head -1)
          if [ -z "$RUNINFO" ]; then
            echo "No pyATS runinfo directory found — trying archive ZIP fallback"
            ZIP=$(ls -t artifacts/pyats-archive/*.zip 2>/dev/null | head -1)
            if [ -n "$ZIP" ]; then
              echo "Extracting archive: $ZIP"
              RUNINFO="artifacts/pyats-runinfo/_extracted"
              mkdir -p "$RUNINFO"
              python3 -c "
          import zipfile, sys
          with zipfile.ZipFile('$ZIP') as z:
              z.extractall('$RUNINFO')
          " 2>/dev/null || unzip -qo "$ZIP" -d "$RUNINFO" 2>/dev/null || true
            fi
          fi

          if [ -z "$RUNINFO" ] || [ ! -d "$RUNINFO" ]; then
            echo "No pyATS archive or runinfo found"
            echo "Contents of artifacts/:"
            find artifacts/ -maxdepth 3 -type f 2>/dev/null | head -30 || true
            exit 0
          fi
          echo "Runinfo: $RUNINFO"

          # Print the TaskLog
          for logfile in "$RUNINFO"/TaskLog.rst "$RUNINFO"/TaskLog; do
            if [ -f "$logfile" ]; then
              echo ""
              echo "=== TaskLog ==="
              cat "$logfile"
              break
            fi
          done

          # Print results summary if available
          RESULTS=$(find "$RUNINFO" -name "results.json" -type f 2>/dev/null | head -1)
          if [ -n "$RESULTS" ]; then
            echo ""
            echo "=== Results JSON ==="
            python3 -c "
          import json, sys
          with open('$RESULTS') as f:
              data = json.load(f)
          json.dump(data, sys.stdout, indent=2)
          " 2>/dev/null || cat "$RESULTS"
          fi

          # List archive contents for debugging
          echo ""
          echo "=== Archive contents ==="
          ls -lhR artifacts/pyats-archive/ 2>/dev/null | head -20 || echo "No archive files"

      - name: Collect container logs
        if: always()
        run: |
          mkdir -p artifacts/logs
          for svc in e2e-mycelium-db e2e-mycelium-backend e2e-cfn-mgmt e2e-cfn-node e2e-matrix-synapse e2e-openclaw-hub; do
            docker logs "$svc" > "artifacts/logs/${svc}.log" 2>&1 || true
          done

          echo "=== Artifact summary ==="
          echo "pyats-archive: $(ls artifacts/pyats-archive/*.zip 2>/dev/null | wc -l) ZIP(s)"
          echo "pyats-runinfo: $(ls -d artifacts/pyats-runinfo/*/ 2>/dev/null | wc -l) run(s)"
          echo "container logs: $(ls artifacts/logs/*.log 2>/dev/null | wc -l) file(s)"
          echo "Total: $(du -sh artifacts/ | cut -f1)"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ github.run_id }}
          path: artifacts/
          retention-days: 30

      - name: Tear down
        if: always()
        run: |
          docker compose -f $COMPOSE_FILE down -v --remove-orphans
