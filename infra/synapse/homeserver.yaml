server_name: "local"
pid_file: /data/homeserver.pid

listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: false
    bind_addresses: ["0.0.0.0"]
    resources:
      - names: [client, federation]
        compress: false

database:
  name: sqlite3
  args:
    database: /data/homeserver.db

log_config: "/data/log.config"

media_store_path: /data/media_store
signing_key_path: /data/signing.key
report_stats: false

# E2E test configuration: shared secret registration, relaxed limits
registration_shared_secret: "e2e-shared-secret"
enable_registration: true
enable_registration_without_verification: true

# Relaxed rate limits for agent traffic
rc_message:
  per_second: 100
  burst_count: 200
rc_registration:
  per_second: 10
  burst_count: 50
rc_login:
  failed_attempts:
    per_second: 10
    burst_count: 50
  account:
    per_second: 10
    burst_count: 50
  address:
    per_second: 10
    burst_count: 50

suppress_key_server_warning: true

# Allow guest access for test observer
allow_guest_access: true
