[pytest]
pythonpath = .
testpaths = tests
filterwarnings =
    ignore::DeprecationWarning
markers =
    llm: requires a working LLM backend (skipped automatically when LLM unavailable)
    matrix: requires a reachable Matrix homeserver
    cfn: exercises CFN / IOC services
    slow: long-running negotiation (minutes)
    convergence: multi-agent convergence scenario tests
    matrix_e2e: true end-to-end tests using Matrix as communication layer
    distributed: tests using real agents on multiple devices (oclw3, oclw4, oclw5)
    openclaw: tests OpenClaw skill configuration and agent execution
